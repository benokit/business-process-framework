version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: my-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    image: nats:alpine
    container_name: nats
    restart: always
    command: "-js"
    ports:
      - "4222:4222"

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: meilisearch
    restart: always
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ""
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  meilisearch_data:
